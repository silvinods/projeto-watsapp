<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>WhatsApp Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .card {
            background: rgba(30, 30, 46, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.8rem;
            color: #f0eef7;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        h1, h2, h3 {
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #c4b5fd, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1 span {
            background: rgba(255,255,255,0.05);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #a78bfa;
            background: linear-gradient(135deg, #2a2a3c, #1e1e2e);
            border: 1px solid #3f3f5e;
        }

        h2 {
            font-size: 1.5rem;
            color: #ddd6fe;
            margin-bottom: 1.2rem;
            border-left: 5px solid #8b5cf6;
            padding-left: 1rem;
        }

        h3 {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            font-size: 0.95rem;
            color: #b9b2d3;
            flex: 1 0 100%;
        }

        .input-group input {
            flex: 2 1 250px;
            background: #252538;
            border: 1px solid #3f3f5e;
            border-radius: 40px;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            color: #f0eef7;
            outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .input-group input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2), inset 0 2px 5px #000;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        .btn {
            background: #2d2d44;
            border: none;
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #e2d9fd;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid #3f3f60;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(145deg, #6d4aff, #5b3ec9);
            border: 1px solid #8a6eff;
            color: white;
            font-weight: 600;
            box-shadow: 0 8px 18px rgba(93, 52, 255, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #7b5eff, #6a4de0);
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #33334b;
            border: 1px solid #5a5a80;
        }

        .btn-secondary:hover {
            background: #3d3d5a;
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            background: #252538;
            border: 1px solid;
            margin: 0.2rem 0;
        }

        .badge-online {
            background: #1e392a;
            color: #6fcf97;
            border-color: #27ae60;
        }

        .badge-offline {
            background: #3e2a2a;
            color: #f28b82;
            border-color: #e74c3c;
        }

        .badge-waiting {
            background: #3d351f;
            color: #f9cb6b;
            border-color: #f39c12;
        }

        .qr-container {
            background: #1f1f30;
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            margin: 1.5rem 0;
            border: 1px dashed #5f4b8b;
        }

        .qr-container img {
            max-width: 220px;
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 25px #00000060;
            background: white;
            padding: 0.5rem;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #252538;
            padding: 1rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #3f3f5e;
        }

        .toggle-switch input[type="checkbox"] {
            appearance: none;
            width: 52px;
            height: 28px;
            background: #3a3a52;
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #5a5a7a;
        }

        .toggle-switch input[type="checkbox"]:checked {
            background: #8b5cf6;
            border-color: #b69eff;
        }

        .toggle-switch input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.2s;
            box-shadow: 0 2px 6px #00000080;
        }

        .toggle-switch input[type="checkbox"]:checked::before {
            left: 27px;
        }

        .rule-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .rule-item {
            background: #1e1e30;
            border-radius: 20px;
            padding: 1rem 1.3rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            border: 1px solid #383855;
            box-shadow: 0 5px 10px #00000020;
        }

        .rule-item .keyword {
            background: #2f2f48;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            color: #b6a6f0;
            border: 1px solid #6a4e9e;
            font-size: 0.9rem;
        }

        .rule-item .response {
            flex: 1;
            color: #cdc6e6;
            word-break: break-word;
        }

        .rule-item .rule-toggle {
            margin-left: auto;
            display: flex;
            align-items: center;
        }

        .rule-item .rule-toggle input {
            width: 40px;
            height: 20px;
            appearance: none;
            background: #3d3d5a;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
        }

        .rule-item .rule-toggle input:checked {
            background: #8b5cf6;
        }

        .rule-item .rule-toggle input::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }

        .rule-item .rule-toggle input:checked::before {
            left: 21px;
        }

        .add-rule {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.5rem;
            background: #252538;
            padding: 1.5rem;
            border-radius: 24px;
        }

        .add-rule input {
            flex: 1 1 180px;
            background: #1b1b2b;
            border: 1px solid #43436b;
            border-radius: 40px;
            padding: 0.8rem 1.5rem;
            color: white;
            outline: none;
        }

        .add-rule button {
            background: #6d4aff;
            border: none;
            border-radius: 40px;
            padding: 0.8rem 2rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #a18aff;
        }

        .add-rule button:hover {
            background: #7b5eff;
        }

        footer {
            text-align: center;
            color: #6b6882;
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        @media (max-width: 600px) {
            .card { padding: 1.2rem; }
            h1 { font-size: 1.8rem; }
            .button-group .btn { flex: 1 1 auto; }
            .rule-item { flex-direction: column; align-items: flex-start; }
            .rule-item .rule-toggle { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📱 WhatsApp Control <span>v1.0</span></h1>

            <!-- URL do backend -->
            <div class="input-group">
                <label>🔗 URL do servidor backend</label>
                <input type="url" id="backendUrl" placeholder="https://seu-bot.onrender.com" value="https://whatsapp-backend-dqfm.onrender.com" />
                <button class="btn btn-secondary" id="saveUrlBtn">Salvar</button>
            </div>

            <!-- Status e QR -->
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h2>📡 Conexão</h2>
                <span id="statusBadge" class="status-badge badge-offline">Offline</span>
            </div>
            <div class="button-group">
                <!-- Botão "Iniciar Bot" removido – o bot já inicia automaticamente -->
                <button class="btn btn-secondary" id="refreshStatusBtn">🔄 Atualizar Status</button>
            </div>

            <div id="qrDisplay" class="qr-container" style="display: none;">
                <h3>📸 Escaneie o QR Code</h3>
                <img id="qrImage" src="" alt="QR Code" />
                <p style="color: #aaa; margin-top: 0.8rem;">Expira rapidamente, escaneie logo.</p>
            </div>

            <!-- Controle Geral (apenas frontend) -->
            <h2 style="margin-top: 2rem;">⚙️ Controle Geral</h2>
            <div class="toggle-switch">
                <span>🤖 Bot ativo</span>
                <input type="checkbox" id="botToggle" checked>
                <span style="color: #b6aefa;">Respondendo mensagens privadas</span>
            </div>

            <!-- Respostas automáticas (simulação local) -->
            <h2 style="margin-top: 2rem;">📝 Respostas automáticas</h2>
            <div id="rulesList" class="rule-list"></div>

            <!-- Adicionar nova regra -->
            <div class="add-rule">
                <input type="text" id="newKeyword" placeholder="Palavra-chave (ex: oi)" />
                <input type="text" id="newResponse" placeholder="Mensagem de resposta" />
                <button id="addRuleBtn">➕ Adicionar</button>
            </div>
            <footer>
                WhatsApp Control Panel — Interface moderna para seu bot
            </footer>
        </div>
    </div>

    <script>
        (function() {
            // URL padrão do backend (já preenchida com a sua)
            let backendUrl = localStorage.getItem('backendUrl') || 'https://whatsapp-backend-dqfm.onrender.com';
            document.getElementById('backendUrl').value = backendUrl;

            // Regras padrão (simuladas no frontend)
            let rules = [
                { keyword: 'oi', response: 'Olá! Atendimento automático.', active: true },
                { keyword: 'menu', response: '1 - Suporte\n2 - Horários', active: true }
            ];

            // Carregar regras do localStorage
            const savedRules = localStorage.getItem('rules');
            if (savedRules) {
                try { rules = JSON.parse(savedRules); } catch (e) {}
            }

            // Elementos DOM
            const statusBadge = document.getElementById('statusBadge');
            const qrDisplay = document.getElementById('qrDisplay');
            const qrImage = document.getElementById('qrImage');
            const botToggle = document.getElementById('botToggle');
            const rulesListDiv = document.getElementById('rulesList');
            const saveUrlBtn = document.getElementById('saveUrlBtn');
            const refreshStatusBtn = document.getElementById('refreshStatusBtn');
            const addRuleBtn = document.getElementById('addRuleBtn');
            const newKeyword = document.getElementById('newKeyword');
            const newResponse = document.getElementById('newResponse');

            // Salvar URL
            function saveBackendUrl() {
                const url = document.getElementById('backendUrl').value.trim();
                if (url) {
                    backendUrl = url.replace(/\/$/, '');
                    localStorage.setItem('backendUrl', backendUrl);
                    alert('URL salva com sucesso!');
                    fetchStatus(); // atualiza status com nova URL
                }
            }
            saveUrlBtn.addEventListener('click', saveBackendUrl);

            // Buscar status no backend
            async function fetchStatus() {
                if (!backendUrl) return;
                try {
                    const response = await fetch(`${backendUrl}/status`);
                    if (!response.ok) throw new Error('Erro na resposta');
                    const data = await response.json();
                    updateStatusUI(data);
                } catch (err) {
                    console.warn('Erro ao buscar status:', err);
                    statusBadge.className = 'status-badge badge-offline';
                    statusBadge.innerText = 'Offline (erro conexão)';
                    qrDisplay.style.display = 'none';
                }
            }

            // Atualizar interface conforme status
            function updateStatusUI(data) {
                if (data.ready === true) {
                    statusBadge.className = 'status-badge badge-online';
                    statusBadge.innerText = 'Online';
                    qrDisplay.style.display = 'none';
                } else if (data.qr === true) {
                    statusBadge.className = 'status-badge badge-waiting';
                    statusBadge.innerText = 'Aguardando QR';
                    fetchQR();
                } else {
                    statusBadge.className = 'status-badge badge-offline';
                    statusBadge.innerText = 'Offline';
                    qrDisplay.style.display = 'none';
                }
            }

            // Buscar e exibir QR code
            async function fetchQR() {
                if (!backendUrl) return;
                try {
                    const response = await fetch(`${backendUrl}/qr`);
                    if (!response.ok) throw new Error('QR não disponível');
                    const html = await response.text();
                    // Extrair a primeira imagem do HTML retornado
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const img = doc.querySelector('img');
                    if (img && img.src) {
                        qrImage.src = img.src;
                        qrDisplay.style.display = 'block';
                    } else {
                        qrDisplay.style.display = 'none';
                    }
                } catch (err) {
                    console.warn('Erro ao buscar QR:', err);
                    qrDisplay.style.display = 'none';
                }
            }

            // Atualizar status manualmente
            refreshStatusBtn.addEventListener('click', fetchStatus);

            // Toggle do bot (apenas frontend)
            botToggle.addEventListener('change', (e) => {
                localStorage.setItem('botActive', e.target.checked);
            });

            // Carregar estado do toggle
            const savedBotActive = localStorage.getItem('botActive');
            if (savedBotActive !== null) {
                botToggle.checked = savedBotActive === 'true';
            }

            // Renderizar lista de regras
            function renderRules() {
                rulesListDiv.innerHTML = '';
                rules.forEach((rule, index) => {
                    const ruleDiv = document.createElement('div');
                    ruleDiv.className = 'rule-item';
                    ruleDiv.innerHTML = `
                        <span class="keyword">${escapeHtml(rule.keyword)}</span>
                        <span class="response">${escapeHtml(rule.response)}</span>
                        <div class="rule-toggle">
                            <input type="checkbox" data-index="${index}" ${rule.active ? 'checked' : ''}>
                        </div>
                        <button class="btn-secondary btn" style="padding:0.4rem 1rem;" data-del-index="${index}">🗑️</button>
                    `;
                    rulesListDiv.appendChild(ruleDiv);
                });

                // Eventos dos toggles
                document.querySelectorAll('.rule-toggle input').forEach(toggle => {
                    toggle.addEventListener('change', (e) => {
                        const index = e.target.dataset.index;
                        if (index !== undefined) {
                            rules[index].active = e.target.checked;
                            saveRules();
                        }
                    });
                });

                // Eventos dos botões deletar
                document.querySelectorAll('[data-del-index]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const index = e.target.dataset.delIndex;
                        if (index !== undefined) {
                            rules.splice(index, 1);
                            saveRules();
                            renderRules();
                        }
                    });
                });
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"']/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return '&#039;';
                });
            }

            function saveRules() {
                localStorage.setItem('rules', JSON.stringify(rules));
            }

            // Adicionar nova regra
            addRuleBtn.addEventListener('click', () => {
                const keyword = newKeyword.value.trim();
                const response = newResponse.value.trim();
                if (!keyword || !response) {
                    alert('Preencha palavra-chave e resposta.');
                    return;
                }
                rules.push({ keyword, response, active: true });
                saveRules();
                renderRules();
                newKeyword.value = '';
                newResponse.value = '';
            });

            // Inicializar
            renderRules();
            fetchStatus();

            // Atualizar status a cada 30s
            setInterval(() => {
                if (backendUrl) fetchStatus();
            }, 30000);
        })();
    </script>
</body>
</html>
