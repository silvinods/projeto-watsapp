<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .container { max-width: 900px; width: 100%; }
        .card { background: rgba(30, 30, 46, 0.9); backdrop-filter: blur(4px); border-radius: 24px; padding: 1.8rem; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1.8rem; color: #f0eef7; }
        h1 { font-size: 2.2rem; background: linear-gradient(135deg, #c4b5fd, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1.5rem; }
        h2 { font-size: 1.5rem; color: #ddd6fe; margin-bottom: 1.2rem; border-left: 5px solid #8b5cf6; padding-left: 1rem; }
        .input-group { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.5rem; }
        .input-group input { flex: 2 1 250px; background: #252538; border: 1px solid #3f3f5e; border-radius: 40px; padding: 0.9rem 1.5rem; color: #f0eef7; outline: none; }
        .input-group button { background: #33334b; border: none; border-radius: 40px; padding: 0.8rem 1.8rem; color: #e2d9fd; cursor: pointer; border: 1px solid #3f3f60; }
        .btn-primary { background: linear-gradient(145deg, #6d4aff, #5b3ec9); border: 1px solid #8a6eff; color: white; font-weight: 600; }
        .status-badge { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; background: #252538; border: 1px solid; }
        .badge-online { background: #1e392a; color: #6fcf97; border-color: #27ae60; }
        .badge-offline { background: #3e2a2a; color: #f28b82; border-color: #e74c3c; }
        .badge-waiting { background: #3d351f; color: #f9cb6b; border-color: #f39c12; }
        .qr-container { background: #1f1f30; border-radius: 24px; padding: 1.5rem; text-align: center; margin: 1.5rem 0; border: 1px dashed #5f4b8b; }
        .qr-container img { max-width: 220px; width: 100%; border-radius: 16px; background: white; padding: 0.5rem; }
        .toggle-switch { display: flex; align-items: center; gap: 1rem; background: #252538; padding: 1rem 1.5rem; border-radius: 60px; }
        .toggle-switch input[type="checkbox"] { appearance: none; width: 52px; height: 28px; background: #3a3a52; border-radius: 40px; position: relative; cursor: pointer; border: 1px solid #5a5a7a; }
        .toggle-switch input[type="checkbox"]:checked { background: #8b5cf6; }
        .toggle-switch input[type="checkbox"]::before { content: ''; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .toggle-switch input[type="checkbox"]:checked::before { left: 27px; }
        .rule-list { display: flex; flex-direction: column; gap: 1rem; margin: 1.5rem 0; }
        .rule-item { background: #1e1e30; border-radius: 20px; padding: 1rem 1.3rem; display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; border: 1px solid #383855; }
        .rule-item .keyword { background: #2f2f48; padding: 0.3rem 1rem; border-radius: 30px; font-weight: 600; color: #b6a6f0; border: 1px solid #6a4e9e; }
        .rule-item .response { flex: 1; color: #cdc6e6; word-break: break-word; }
        .add-rule { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 1.5rem; background: #252538; padding: 1.5rem; border-radius: 24px; }
        .add-rule input { flex: 1 1 180px; background: #1b1b2b; border: 1px solid #43436b; border-radius: 40px; padding: 0.8rem 1.5rem; color: white; }
        .add-rule button { background: #6d4aff; border: none; border-radius: 40px; padding: 0.8rem 2rem; color: white; font-weight: 600; cursor: pointer; }
        footer { text-align: center; color: #6b6882; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📱 WhatsApp Control</h1>

            <!-- URL do backend -->
            <div class="input-group">
                <input type="url" id="backendUrl" placeholder="https://seu-backend.onrender.com" value="https://whatsapp-backend-dqfm.onrender.com">
                <button id="saveUrlBtn">Salvar URL</button>
            </div>

            <!-- Status e QR -->
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>📡 Conexão</h2>
                <span id="statusBadge" class="status-badge badge-offline">Offline</span>
            </div>
            <div class="button-group" style="margin: 1rem 0;">
                <button class="btn-primary" id="refreshStatusBtn">🔄 Atualizar Status</button>
            </div>
            <div id="qrDisplay" class="qr-container" style="display: none;">
                <img id="qrImage" src="" alt="QR Code">
                <p>Escaneie o QR Code com seu WhatsApp</p>
            </div>

            <!-- Controle Geral -->
            <h2>⚙️ Controle Geral</h2>
            <div class="toggle-switch">
                <span>🤖 Bot ativo</span>
                <input type="checkbox" id="botToggle">
                <span id="botStatusText">Respondendo mensagens</span>
            </div>

            <!-- Respostas automáticas -->
            <h2>📝 Respostas automáticas</h2>
            <div id="rulesList" class="rule-list"></div>

            <!-- Adicionar nova regra (apenas local) -->
            <div class="add-rule">
                <input type="text" id="newKeyword" placeholder="Palavra-chave (ex: oi)">
                <input type="text" id="newResponse" placeholder="Mensagem de resposta">
                <button id="addRuleBtn">➕ Adicionar</button>
            </div>
            <footer>WhatsApp Control Panel — Interface para seu bot</footer>
        </div>
    </div>

    <script>
        // ========== CONFIGURAÇÕES ==========
        let backendUrl = localStorage.getItem('backendUrl') || 'https://whatsapp-backend-dqfm.onrender.com';
        document.getElementById('backendUrl').value = backendUrl;

        let rules = []; // será carregado do backend
        let botAtivo = true;

        // ========== ELEMENTOS DOM ==========
        const statusBadge = document.getElementById('statusBadge');
        const qrDisplay = document.getElementById('qrDisplay');
        const qrImage = document.getElementById('qrImage');
        const botToggle = document.getElementById('botToggle');
        const botStatusText = document.getElementById('botStatusText');
        const rulesListDiv = document.getElementById('rulesList');
        const saveUrlBtn = document.getElementById('saveUrlBtn');
        const refreshStatusBtn = document.getElementById('refreshStatusBtn');
        const addRuleBtn = document.getElementById('addRuleBtn');
        const newKeyword = document.getElementById('newKeyword');
        const newResponse = document.getElementById('newResponse');

        // ========== FUNÇÕES ==========
        function salvarUrl() {
            const url = document.getElementById('backendUrl').value.trim();
            if (url) {
                backendUrl = url.replace(/\/$/, '');
                localStorage.setItem('backendUrl', backendUrl);
                alert('URL salva!');
                fetchStatus();
            }
        }

        async function fetchStatus() {
            if (!backendUrl) return;
            try {
                const response = await fetch(`${backendUrl}/status`);
                if (!response.ok) throw new Error('Erro na resposta');
                const data = await response.json();
                atualizarUI(data);
                if (data.qr) fetchQR();
            } catch (err) {
                console.error('Erro ao buscar status:', err);
                statusBadge.className = 'status-badge badge-offline';
                statusBadge.innerText = 'Offline (erro)';
                qrDisplay.style.display = 'none';
            }
        }

        async function fetchQR() {
            if (!backendUrl) return;
            try {
                const response = await fetch(`${backendUrl}/qr`);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const img = doc.querySelector('img');
                if (img && img.src) {
                    qrImage.src = img.src;
                    qrDisplay.style.display = 'block';
                } else {
                    qrDisplay.style.display = 'none';
                }
            } catch (err) {
                console.warn('Erro ao buscar QR:', err);
                qrDisplay.style.display = 'none';
            }
        }

        async function fetchRegras() {
            if (!backendUrl) return;
            try {
                const response = await fetch(`${backendUrl}/regras`);
                if (!response.ok) throw new Error('Erro ao carregar regras');
                rules = await response.json();
                renderRules();
            } catch (err) {
                console.error('Erro ao carregar regras:', err);
                // Fallback para regras padrão
                rules = [
                    { keyword: 'oi', response: 'Olá! Como posso ajudar?', active: true },
                    { keyword: 'menu', response: '📋 Menu...', active: true }
                ];
                renderRules();
            }
        }

        async function toggleBot(ativo) {
            if (!backendUrl) return;
            try {
                await fetch(`${backendUrl}/toggle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ativo })
                });
                botAtivo = ativo;
                atualizarToggleUI();
            } catch (err) {
                console.error('Erro ao alternar bot:', err);
            }
        }

        function atualizarUI(data) {
            if (data.ready) {
                statusBadge.className = 'status-badge badge-online';
                statusBadge.innerText = 'Online';
                qrDisplay.style.display = 'none';
            } else if (data.qr) {
                statusBadge.className = 'status-badge badge-waiting';
                statusBadge.innerText = 'Aguardando QR';
                // QR será buscado separadamente
            } else {
                statusBadge.className = 'status-badge badge-offline';
                statusBadge.innerText = 'Offline';
                qrDisplay.style.display = 'none';
            }
            botAtivo = data.botAtivo;
            atualizarToggleUI();
        }

        function atualizarToggleUI() {
            botToggle.checked = botAtivo;
            botStatusText.innerText = botAtivo ? 'Respondendo mensagens' : 'Desativado';
        }

        function renderRules() {
            rulesListDiv.innerHTML = '';
            rules.forEach((rule, index) => {
                const ruleDiv = document.createElement('div');
                ruleDiv.className = 'rule-item';
                ruleDiv.innerHTML = `
                    <span class="keyword">${escapeHtml(rule.keyword)}</span>
                    <span class="response">${escapeHtml(rule.response)}</span>
                    <div class="rule-toggle">
                        <input type="checkbox" data-index="${index}" ${rule.active ? 'checked' : ''}>
                    </div>
                    <button class="btn-secondary" style="padding:0.4rem 1rem;" data-del-index="${index}">🗑️</button>
                `;
                rulesListDiv.appendChild(ruleDiv);
            });

            // Eventos dos toggles
            document.querySelectorAll('.rule-toggle input').forEach(toggle => {
                toggle.addEventListener('change', (e) => {
                    const index = e.target.dataset.index;
                    if (index !== undefined) {
                        rules[index].active = e.target.checked;
                        salvarRulesLocal();
                    }
                });
            });

            // Eventos dos botões deletar
            document.querySelectorAll('[data-del-index]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = e.target.dataset.delIndex;
                    if (index !== undefined) {
                        rules.splice(index, 1);
                        salvarRulesLocal();
                        renderRules();
                    }
                });
            });
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"']/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return '&#039;';
            });
        }

        function salvarRulesLocal() {
            // Salva no localStorage para persistência local
            localStorage.setItem('rules', JSON.stringify(rules));
        }

        // ========== EVENTOS ==========
        saveUrlBtn.addEventListener('click', salvarUrl);
        refreshStatusBtn.addEventListener('click', () => fetchStatus());

        botToggle.addEventListener('change', (e) => {
            toggleBot(e.target.checked);
        });

        addRuleBtn.addEventListener('click', () => {
            const keyword = newKeyword.value.trim();
            const response = newResponse.value.trim();
            if (!keyword || !response) {
                alert('Preencha ambos os campos');
                return;
            }
            rules.push({ keyword, response, active: true });
            salvarRulesLocal();
            renderRules();
            newKeyword.value = '';
            newResponse.value = '';
        });

        // ========== INICIALIZAÇÃO ==========
        // Carrega regras do localStorage primeiro
        const savedRules = localStorage.getItem('rules');
        if (savedRules) {
            try {
                rules = JSON.parse(savedRules);
                renderRules();
            } catch (e) {}
        } else {
            fetchRegras(); // busca do backend
        }

        fetchStatus();
        setInterval(() => fetchStatus(), 30000); // atualiza a cada 30s
    </script>
</body>
</html>
