<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .container { max-width: 900px; width: 100%; }
        .card { background: #16213e; border-radius: 24px; padding: 2rem; box-shadow: 0 20px 40px -10px #00000080; border: 1px solid #0f3460; color: #e0e0e0; }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #a78bfa; display: flex; align-items: center; gap: 0.5rem; }
        h2 { font-size: 1.3rem; margin: 1.5rem 0 1rem; border-left: 5px solid #8b5cf6; padding-left: 1rem; }
        .input-group { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.5rem; }
        .input-group input { flex: 2 1 250px; background: #0f3460; border: 1px solid #1a4a7a; border-radius: 40px; padding: 0.8rem 1.5rem; color: white; outline: none; }
        .btn { background: #0f3460; border: none; border-radius: 40px; padding: 0.8rem 1.8rem; color: white; cursor: pointer; transition: 0.2s; border: 1px solid #1a4a7a; }
        .btn-primary { background: #8b5cf6; border-color: #a78bfa; }
        .btn-primary:hover { background: #7c4dff; }
        .status-badge { display: inline-block; padding: 0.4rem 1.2rem; border-radius: 40px; font-weight: 600; background: #0f3460; border: 1px solid; }
        .badge-online { background: #1e392a; color: #6fcf97; border-color: #27ae60; }
        .badge-offline { background: #3e2a2a; color: #f28b82; border-color: #e74c3c; }
        .badge-waiting { background: #3d351f; color: #f9cb6b; border-color: #f39c12; }
        .qr-container { background: #0f3460; border-radius: 24px; padding: 1.5rem; text-align: center; margin: 1.5rem 0; border: 1px dashed #8b5cf6; }
        .qr-container img { max-width: 220px; border-radius: 16px; background: white; padding: 0.5rem; }
        .toggle-switch { display: flex; align-items: center; gap: 1rem; background: #0f3460; padding: 1rem 1.5rem; border-radius: 60px; border: 1px solid #1a4a7a; }
        .toggle-switch input[type="checkbox"] { appearance: none; width: 52px; height: 28px; background: #1a4a7a; border-radius: 40px; position: relative; cursor: pointer; border: 1px solid #2a5a8a; }
        .toggle-switch input[type="checkbox"]:checked { background: #8b5cf6; }
        .toggle-switch input[type="checkbox"]::before { content: ''; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .toggle-switch input[type="checkbox"]:checked::before { left: 27px; }
        .rule-list { display: flex; flex-direction: column; gap: 0.8rem; margin: 1rem 0; }
        .rule-item { background: #0f3460; border-radius: 16px; padding: 0.8rem 1.2rem; display: flex; flex-wrap: wrap; align-items: center; gap: 1rem; border: 1px solid #1a4a7a; }
        .rule-item .keyword { background: #1a4a7a; padding: 0.2rem 1rem; border-radius: 30px; font-weight: 600; color: #b6a6f0; }
        .rule-item .response { flex: 1; color: #cdc6e6; }
        footer { text-align: center; color: #6b6882; margin-top: 2rem; }
        @media (max-width: 600px) { .card { padding: 1.2rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📱 WhatsApp Control</h1>

            <!-- URL do backend -->
            <div class="input-group">
                <input type="url" id="backendUrl" placeholder="https://seu-bot.railway.app" value="https://seuapp.railway.app">
                <button class="btn btn-primary" id="saveUrlBtn">Salvar</button>
            </div>

            <!-- Status e QR -->
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>📡 Conexão</h2>
                <span id="statusBadge" class="status-badge badge-offline">Offline</span>
            </div>
            <div style="margin: 1rem 0;">
                <button class="btn" id="refreshStatusBtn">🔄 Atualizar Status</button>
            </div>
            <div id="qrDisplay" class="qr-container" style="display: none;">
                <img id="qrImage" src="" alt="QR Code">
            </div>

            <!-- Controle Geral (Toggle) -->
            <h2>⚙️ Controle Geral</h2>
            <div class="toggle-switch">
                <span>🤖 Bot ativo</span>
                <input type="checkbox" id="botToggle">
                <span id="botStatusText">Desativado</span>
            </div>

            <!-- Respostas automáticas (lista estática) -->
            <h2>📝 Respostas automáticas</h2>
            <div class="rule-list" id="rulesList">
                <!-- será preenchido via JS -->
            </div>
            <footer>Painel de controle - Bot WhatsApp</footer>
        </div>
    </div>

    <script>
        // Lista de respostas (igual ao backend)
        const respostas = {
            'oi': 'Olá! Como posso ajudar?',
            'ola': 'Olá! Como posso ajudar?',
            'nino': 'Olá! O Silvino não está no momento, mas deixe sua mensagem que ele retorna assim que possível.',
            'esta em casa': 'O Silvino não está em casa agora. Deixe seu recado!',
            'ta por onde': 'Ele não está por perto no momento. Em que posso ajudar?',
            'vem aqui': 'Infelizmente ele não pode ir agora. Deixe sua mensagem.',
            'oi meu anjo': 'Olá! 😊 Como posso ajudar você?',
            'bom dia': 'Bom dia! Em que posso ser útil?',
            'boa tarde': 'Boa tarde! Como posso ajudar?',
            'boa noite': 'Boa noite! Em que posso auxiliar?',
            'menu': '📋 *Menu de opções*\n1 - Informações\n2 - Suporte\n3 - Horários',
            'ajuda': 'Comandos disponíveis: oi, menu, info, suporte, horarios, contato',
            'tchau': 'Até logo! Se precisar, estou aqui.',
            'obrigado': 'Por nada! Estou à disposição.'
        };

        // Estado
        let backendUrl = localStorage.getItem('backendUrl') || 'https://seuapp.railway.app';
        document.getElementById('backendUrl').value = backendUrl;

        // Elementos DOM
        const statusBadge = document.getElementById('statusBadge');
        const qrDisplay = document.getElementById('qrDisplay');
        const qrImage = document.getElementById('qrImage');
        const botToggle = document.getElementById('botToggle');
        const botStatusText = document.getElementById('botStatusText');
        const refreshBtn = document.getElementById('refreshStatusBtn');
        const saveUrlBtn = document.getElementById('saveUrlBtn');
        const rulesList = document.getElementById('rulesList');

        // Preencher lista de regras
        function renderRules() {
            let html = '';
            for (const [key, value] of Object.entries(respostas)) {
                html += `<div class="rule-item"><span class="keyword">${key}</span><span class="response">${value}</span></div>`;
            }
            rulesList.innerHTML = html;
        }
        renderRules();

        // Salvar URL
        saveUrlBtn.addEventListener('click', () => {
            backendUrl = document.getElementById('backendUrl').value.replace(/\/$/, '');
            localStorage.setItem('backendUrl', backendUrl);
            fetchStatus();
        });

        // Buscar status
        async function fetchStatus() {
            if (!backendUrl) return;
            try {
                const res = await fetch(`${backendUrl}/status`);
                if (!res.ok) throw new Error('Erro na resposta');
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error('Erro ao buscar status:', err);
                statusBadge.className = 'status-badge badge-offline';
                statusBadge.innerText = 'Offline';
                qrDisplay.style.display = 'none';
            }
        }

        // Atualizar interface
        function updateUI(data) {
            // Status badge
            if (data.ready) {
                statusBadge.className = 'status-badge badge-online';
                statusBadge.innerText = 'Online';
                qrDisplay.style.display = 'none';
            } else if (data.qr) {
                statusBadge.className = 'status-badge badge-waiting';
                statusBadge.innerText = 'Aguardando QR';
                fetchQR();
            } else {
                statusBadge.className = 'status-badge badge-offline';
                statusBadge.innerText = 'Offline';
                qrDisplay.style.display = 'none';
            }

            // Toggle do bot
            botToggle.checked = data.botAtivo;
            botStatusText.innerText = data.botAtivo ? 'Ativado' : 'Desativado';
        }

        // Buscar QR
        async function fetchQR() {
            if (!backendUrl) return;
            try {
                const res = await fetch(`${backendUrl}/qr`);
                const html = await res.text();
                // Extrair src da imagem
                const match = html.match(/<img[^>]+src="([^">]+)"/);
                if (match && match[1]) {
                    qrImage.src = match[1];
                    qrDisplay.style.display = 'block';
                } else {
                    qrDisplay.style.display = 'none';
                }
            } catch (err) {
                console.error('Erro ao buscar QR:', err);
                qrDisplay.style.display = 'none';
            }
        }

        // Ligar/desligar via toggle
        botToggle.addEventListener('change', async (e) => {
            const ativo = e.target.checked;
            try {
                const res = await fetch(`${backendUrl}/toggle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ativo })
                });
                if (res.ok) {
                    botStatusText.innerText = ativo ? 'Ativado' : 'Desativado';
                } else {
                    // Reverte se falhar
                    botToggle.checked = !ativo;
                    alert('Erro ao alterar estado');
                }
            } catch (err) {
                botToggle.checked = !ativo;
                alert('Erro de conexão');
            }
        });

        // Atualizar manualmente
        refreshBtn.addEventListener('click', fetchStatus);

        // Inicializar
        fetchStatus();
        setInterval(fetchStatus, 30000); // atualiza a cada 30s
    </script>
</body>
</html>
